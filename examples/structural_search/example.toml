# TOML configuration file for structural search testing.

# Application settings.
[app]
name = "phosphor-example"
version = "1.0.0"
debug = false
port = 8080

# Database configuration.
[database]
host = "localhost"
port = 5432
name = "myapp_db"
user = "admin"
password = "secret"
ssl_mode = "require"
max_connections = 20

# Logging configuration.
[logging]
level = "info"
format = "json"
output = "stdout"

[[logging.handlers]]
name = "file"
path = "/var/log/myapp.log"
max_size = "100MB"
max_age = 30

[[logging.handlers]]
name = "syslog"
address = "udp://localhost:514"

# Feature flags.
[features]
dark_mode = true
notifications = false
beta_features = false

[[features.items]]
name = "experimental-api"
enabled = false

[[features.items]]
name = "new-dashboard"
enabled = true

# Server settings.
[server]
workers = 4
timeout = 30
read_buffer = "4KB"
write_buffer = "4KB"

[server.tls]
enabled = true
cert_file = "/etc/ssl/certs/server.crt"
key_file = "/etc/ssl/private/server.key"

# Cache configuration.
[cache]
driver = "redis"
host = "localhost"
port = 6379
ttl = 3600
max_size = 10000